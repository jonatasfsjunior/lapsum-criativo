name: Build e deploy

on:
  push:
    branches: [main]
  repository_dispatch:
    types: [content-updated]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo principal
        uses: actions/checkout@v4

      - name: Checkout repo de conteúdo
        uses: actions/checkout@v4
        with:
          repository: jonatasfsjunior/lapsum-content
          path: _content
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Mesclar conteúdo
        run: |
          cp -r _content/_data ./_data 2>/dev/null || true
          cp -r _content/_img ./assets/img 2>/dev/null || true
          cp -r _content/_products ./_products 2>/dev/null || true

      - name: Configurar Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'
          bundler-cache: false

      - name: Instalar dependências
        run: |
          gem install bundler:4.0.15
          bundle _4.0.15_ install

      - name: Build Jekyll
        run: bundle exec jekyll build
        env:
          JEKYLL_ENV: production

      - name: Preparar output para Vercel
        run: |
          mkdir -p .vercel/output/static
          cp -r _site/. .vercel/output/static/
          echo '{"version":3}' > .vercel/output/config.json

      - name: Deploy para Vercel
        run: npx vercel deploy --prebuilt --prod --yes
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}